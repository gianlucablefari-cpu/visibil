<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grazie — VISIBIL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #fff; color: #0F0F0F; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
  .logo { font-weight: 900; font-size: 1rem; letter-spacing: 0.22em; margin-bottom: 3rem; }
  .cursor { display: inline-block; width: 0.07em; height: 0.82em; background: #1A1AE6; margin-left: 0.05em; vertical-align: baseline; animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  h1 { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 900; letter-spacing: -0.03em; margin-bottom: 1rem; }
  p { font-size: 1rem; font-weight: 300; color: #8A8A8A; max-width: 400px; line-height: 1.7; margin-bottom: 2.5rem; }
  .buttons { display: flex; gap: 0.85rem; flex-wrap: wrap; justify-content: center; }
  a { display: inline-block; padding: 0.85rem 2rem; background: #0F0F0F; color: #fff; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; border-radius: 2px; transition: background 0.2s; }
  a:hover { background: #1A1AE6; }
  a.secondary { background: transparent; color: #0F0F0F; border: 1px solid rgba(0,0,0,0.15); }
  a.secondary:hover { background: #0F0F0F; color: #fff; border-color: #0F0F0F; }
</style>
</head>
<body>
  <div class="logo">VISIBIL<span class="cursor"></span></div>
  <h1>Pagamento ricevuto.</h1>
  <p>Grazie! Il tuo abbonamento è attivo. Puoi seguire i tuoi progetti, documenti e pagamenti in qualsiasi momento dalla tua area riservata.</p>
  <div class="buttons">
    <a href="/area-cliente.html">Area clienti</a>
    <a href="/" class="secondary">← Torna alla home</a>
  </div>
</body>
</html>
