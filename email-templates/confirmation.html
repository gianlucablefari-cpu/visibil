<div style="font-family: Arial, Helvetica, sans-serif; max-width: 480px; margin: 0 auto; padding: 32px 24px; color: #0F0F0F;">
  <div style="font-weight: 900; font-size: 15px; letter-spacing: 0.22em; margin-bottom: 32px;">VISIBIL</div>

  <h2 style="font-size: 20px; margin: 0 0 16px;">Conferma il tuo account</h2>

  <p style="font-size: 14px; line-height: 1.6; color: #333;">
    Ciao,<br><br>
    Conferma il tuo indirizzo email per completare la registrazione su {{ .SiteURL }}.
  </p>

  <p style="margin: 32px 0;">
    <a href="{{ .SiteURL }}/area-cliente.html?confirmation_token={{ .Token }}"
       style="background: #0F0F0F; color: #FFFFFF; text-decoration: none; padding: 14px 28px; border-radius: 4px; font-size: 14px; display: inline-block;">
      Conferma email
    </a>
  </p>

  <p style="font-size: 12px; color: #8A8A8A; line-height: 1.6;">
    Se il bottone non funziona, copia e incolla questo indirizzo nel browser:<br>
    {{ .SiteURL }}/area-cliente.html?confirmation_token={{ .Token }}
  </p>
</div>
